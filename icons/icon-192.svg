<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#1a1a2e"/>
  <g transform="translate(96,88)">
    <!-- Microphone body -->
    <rect x="-20" y="-40" width="40" height="68" rx="20" fill="#e94560"/>
    <!-- Microphone arc -->
    <path d="M-32,10 a32,32 0 0,0 64,0" fill="none" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
    <!-- Microphone stand -->
    <line x1="0" y1="42" x2="0" y2="58" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
    <line x1="-16" y1="58" x2="16" y2="58" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Pulse rings -->
  <circle cx="96" cy="88" r="60" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
  <circle cx="96" cy="88" r="76" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15"/>
</svg>
